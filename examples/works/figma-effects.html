<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Figma Shaders port on VFX-JS</title>
<style>
  :root{
    --bg:#ffffff; --stage:#f4f4f5; --panel:#ffffff; --ink:#111111;
    --muted:#6b7280; --line:#e6e6e6; --accent:#0d99ff; --accent-tint:rgba(13,153,255,.12);
    --topbar-h:64px; --side-w:220px; --footer-h:320px; --tabs-h:52px;
    /* Shared frame content height: stage minus its padding, the name row,
       and the frame padding/border. Every frame scales to fill this. */
    --frame-h:calc(100vh - var(--topbar-h) - var(--footer-h) - 130px);
    --sans:"Inter","Figma Sans VF",system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;}

  /* VFX-JS's canvas defaults to z-index 9999, so all UI sits above it. */
  .topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:10002;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;background:#DDFF22;border-bottom:1px solid rgba(0,0,0,.12);}
  .brand{display:flex;align-items:center;gap:10px;font-size:.92rem;letter-spacing:.02em;}
  .brand .logo{height:56px;display:block; margin-top: 4px;}
  .brand strong{font-weight:700;font-size:1.3rem;}
  .brand span{color:var(--muted);font-weight:500;margin-left:2px;
    letter-spacing:.02em;font-size:.78rem;}
  .cta{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;
    border-radius:999px;background:var(--ink);color:#fff;text-decoration:none;
    font-size:.78rem;font-weight:600;letter-spacing:.02em;}
  .cta:hover{background:#000;}

  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--side-w);
    z-index:10000;background:var(--panel);border-right:1px solid var(--line);
    padding:18px 14px;overflow:auto;}
  .side-title{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 2px 10px;}
  /* Effect toggles — click to enable/disable, drag to reorder apply order. */
  .side-btn{position:relative;display:flex;align-items:center;gap:8px;width:100%;
    padding:10px 12px;margin-bottom:6px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel);color:var(--ink);font:inherit;font-size:.85rem;font-weight:500;
    text-align:left;cursor:grab;transition:border-color .12s,background .12s;}
  .side-btn:hover{border-color:var(--accent);}
  .side-btn .grip{color:var(--muted);font-size:.9rem;}
  .side-btn .label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .side-btn .mark{width:1em;text-align:center;color:var(--muted);font-size:1.05rem;line-height:1;}
  .side-btn.active{border-color:var(--accent);background:var(--accent-tint);}
  .side-btn.active .mark{color:var(--accent);}
  .side-btn.dragging{opacity:.4;}
  .side-btn.drop-before::after,.side-btn.drop-after::after{content:"";
    position:absolute;left:0;right:0;height:3px;border-radius:999px;
    background:var(--accent);box-shadow:0 0 0 2px var(--accent-tint);}
  .side-btn.drop-before::after{top:-5px;}
  .side-btn.drop-after::after{bottom:-5px;}

  /* Full-screen loader shown until every frame source has loaded. */
  .loader{position:fixed;inset:0;z-index:10050;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;background:var(--bg);
    color:var(--muted);font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;
    transition:opacity .3s;}
  .loader.done{opacity:0;pointer-events:none;}
  .loader .spinner{width:34px;height:34px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--accent);
    animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Horizontal gallery: frames scroll left/right and snap to center. */
  .stage{position:fixed;top:var(--topbar-h);left:var(--side-w);right:0;bottom:var(--footer-h);
    display:flex;align-items:center;gap:40px;overflow-x:auto;overflow-y:hidden;
    overscroll-behavior:none;
    padding:40px;background:var(--stage);scroll-snap-type:x mandatory;scroll-padding-inline:40px;}
  /* One gallery cell: a name label above its frame. */
  .frame-cell{flex:0 0 auto;scroll-snap-align:center;cursor:pointer;
    display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
  /* Trailing room so the last frame can scroll out from under the pane (300 + 16). */
  .frame-cell:last-child{margin-right:316px;}
  .frame-name{font-size:.82rem;font-weight:600;letter-spacing:.02em;color:var(--muted);
    white-space:nowrap;transition:color .15s;}
  .frame-cell.selected .frame-name{color:var(--ink);}
  .frame{background:#fff;border:1px solid var(--line);border-radius:4px;padding:8px;line-height:0;
    outline:2px solid transparent;outline-offset:3px;transition:outline-color .15s;}
  /* The frame currently driven by the sidebar/pane. */
  .frame-cell.selected .frame{outline-color:var(--accent);}
  /* Every frame scales to the shared stage height; width follows aspect. */
  .frame img,.frame video{display:block;border-radius:4px;
    height:var(--frame-h);width:auto;}
  /* Text source: a real DOM block VFX renders to a texture. */
  .frame-text{box-sizing:border-box;width:min(46vw,560px);height:var(--frame-h);
    padding:48px 44px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;
    line-height:1.32;color:var(--ink);background:#fff;border-radius:4px;text-align:left;}
  .frame-text h1{font-size:5rem;font-weight:800;letter-spacing:-.01em;margin-bottom:18px;}
  .frame-text p{font-size:2.5rem;font-weight:450;color:#374151;margin-bottom:12px;}
  .frame-text p:last-child{margin-bottom:0;}
  /* Webcam placeholder shown until the user starts the camera. */
  .frame-webcam{box-sizing:border-box;display:grid;place-items:center;
    width:min(40vw,480px);height:var(--frame-h);background:#111;border-radius:4px;}
  .frame-webcam-btn{padding:14px 28px;border:none;border-radius:999px;
    background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:1rem;
    letter-spacing:.02em;cursor:pointer;}
  .frame-webcam-btn:hover{filter:brightness(1.05);}
  .frame [hidden]{display:none;}

  .pane{position:fixed;top:calc(var(--topbar-h) + 16px);right:16px;width:300px;z-index:10000;
    max-height:calc(100vh - var(--topbar-h) - var(--footer-h) - 32px);overflow:auto;
    border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.10);
    /* Tweakpane light theme */
    --tp-base-background-color:#ffffff;--tp-base-shadow-color:rgba(0,0,0,.1);
    --tp-button-background-color:#f0f0f0;--tp-button-background-color-active:#d8d8d8;
    --tp-button-background-color-focus:#e4e4e4;--tp-button-background-color-hover:#e8e8e8;
    --tp-button-foreground-color:#111111;
    --tp-container-background-color:#f6f6f6;--tp-container-background-color-active:#e2e2e2;
    --tp-container-background-color-focus:#ececec;--tp-container-background-color-hover:#efefef;
    --tp-container-foreground-color:#333333;--tp-groove-foreground-color:#e2e2e2;
    --tp-input-background-color:#f0f0f0;--tp-input-background-color-active:#e2e2e2;
    --tp-input-background-color-focus:#e8e8e8;--tp-input-background-color-hover:#ececec;
    --tp-input-foreground-color:#111111;--tp-label-foreground-color:#555555;
    --tp-monitor-background-color:#f0f0f0;--tp-monitor-foreground-color:#333333;}


  /* Footer: live VFX-JS code snippet for the current effect stack. */
  .footer{position:fixed;left:var(--side-w);right:0;bottom:0;height:var(--footer-h);
    z-index:10001;display:flex;flex-direction:column;
    background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;}
  .footer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .copy-btn{height:28px;padding:0 12px;border:1px solid var(--line);border-radius:999px;
    background:var(--panel);color:var(--ink);font:inherit;font-size:.74rem;font-weight:600;
    cursor:pointer;transition:border-color .12s,background .12s;}
  .copy-btn:hover{border-color:var(--accent);background:var(--accent-tint);}
  .code{flex:1;overflow-y:scroll;overflow-x:auto;margin:0;background:#1c1c22;
    border:1px solid #2a2a32;border-radius:8px;padding:12px 14px;}
  /* Force an always-visible scrollbar (macOS overlay bars hide otherwise). */
  .code::-webkit-scrollbar{width:10px;height:10px;}
  .code::-webkit-scrollbar-track{background:transparent;}
  .code::-webkit-scrollbar-thumb{background:#45454f;border-radius:999px;
    border:2px solid #1c1c22;}
  .code::-webkit-scrollbar-thumb:hover{background:#5a5a66;}
  .code code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:.78rem;line-height:1.5;color:#e6e6e6;white-space:pre;}
  .t-com{color:#6a9955;}.t-str{color:#ce9178;}.t-kw{color:#569cd6;}
  .t-num{color:#b5cea8;}.t-cls{color:#4ec9b0;}.t-prop{color:#9cdcfe;}

  /* Bottom tab bar to open the panels as sheets — narrow screens only. */
  .mobile-tabs{display:none;}

  /* Narrow screens: the three fixed panels become bottom sheets the user
     opens one at a time; the gallery fills the rest of the screen. */
  @media (max-width:720px){
    .brand span{display:none;}
    .brand .logo{height:40px;margin-top:0;}
    .brand strong{font-size:1.05rem;}

    /* Gallery takes the full area above the tab bar. */
    .stage{left:0;right:0;bottom:var(--tabs-h);gap:20px;padding:20px;
      scroll-snap-type:none;
      --frame-h:calc(100vh - var(--topbar-h) - var(--tabs-h) - 80px);}
    .frame-cell:last-child{margin-right:20px;}
    /* Webcam needs a permission prompt; skip it on mobile. */
    .frame-cell[data-source="Webcam"]{display:none;}
    /* Fit each frame to one screen width; height follows aspect, capped to
       the stage so the whole frame stays visible and vertically centered. */
    .frame img,.frame video{height:auto;width:auto;
      max-width:calc(100vw - 56px);max-height:var(--frame-h);}
    .frame-text{width:calc(100vw - 56px);height:auto;max-height:var(--frame-h);
      padding:28px 26px;}
    .frame-text h1{font-size:2rem;margin-bottom:10px;}
    .frame-text p{font-size:1rem;}
    .frame-webcam{width:calc(100vw - 56px);
      height:min(var(--frame-h),calc(100vw - 56px));}

    /* Shared bottom-sheet frame: slides up from behind the tab bar. */
    .sidebar,.pane,.footer{position:fixed;left:0;right:0;top:auto;
      bottom:var(--tabs-h);width:auto;height:min(36vh,360px);max-height:none;
      border:none;border-top:1px solid var(--line);border-radius:14px 14px 0 0;
      box-shadow:0 -8px 24px rgba(0,0,0,.18);overflow:auto;z-index:10003;
      transform:translateY(115%);transition:transform .25s ease;}
    body.sheet-effects .sidebar{transform:none;}
    body.sheet-controls .pane{transform:none;}
    body.sheet-code .footer{transform:none;}

    /* Bottom tab bar. */
    .mobile-tabs{display:flex;position:fixed;left:0;right:0;bottom:0;
      height:var(--tabs-h);z-index:10004;background:var(--panel);
      border-top:1px solid var(--line);}
    .mobile-tabs button{flex:1;border:none;background:none;font:inherit;
      font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;
      border-top:2px solid transparent;}
    body.sheet-effects .mobile-tabs [data-sheet="effects"],
    body.sheet-controls .mobile-tabs [data-sheet="controls"],
    body.sheet-code .mobile-tabs [data-sheet="code"]{
      color:var(--accent);border-top-color:var(--accent);
      background:var(--accent-tint);}
  }
</style>
  <script type="module" crossorigin src="../assets/figma-effects-BKwpCObI.js"></script>

</head>
<body>

<header class="topbar">

<aside class="sidebar" id="sidebar">
  <div class="side-title">Effects · click to toggle, drag to sort</div>
  <div id="effect-list"></div>
</aside>

<div class="pane" id="pane"></div>
<footer class="footer">
  <div class="footer-head">
    <span class="side-title" style="margin:0">Code</span>
    <button class="copy-btn" id="copy-btn">Copy</button>
  </div>
  <pre class="code"><code id="snippet"></code></pre>
</footer>
