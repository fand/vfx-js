<!DOCTYPE html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pixel Scan</title>

<style>
  html,
  body {
    height: 100%;
    margin: 0;
  }
  body {
    background: black;
    text-align: center;
  }

  section {
    padding: calc(50svh - 15svh) 0;
  }
  img {
    height: 30svh;
    opacity: 0;
  }
  img:first-child {
    margin-bottom: 30svh;
  }
  img:last-child {
    margin-top: 30svh;
  }
  h2 {
    display: block;
    color: white;
    font-family: sans-serif;
    font-size: 24svh;
    margin: 8svw 0;
  }
</style>

<section>
  <img
    src="https://amagi.dev/vfx-js/vfx-js-logo-no-padding.svg"
    data-delay="0.3"
  />

  <h2>Hello.</h2>
  <h2>New.</h2>
  <h2>World.</h2>

  <img
    src="https://amagi.dev/vfx-js/vfx-js-logo-no-padding.svg"
    data-mode="2"
    data-delay="0.3"
  />
</section>

<script type="module">
  // Recreating Smertimba Graphics's Pixel Scan effect using VFX-JS
  // https://www.youtube.com/watch?v=JFn2kK8GhUQ
  import { VFX } from "@vfx-js/core";

  const shader = `
precision highp float;
uniform sampler2D src;
uniform vec2 resolution;
uniform vec2 offset;
uniform float time;
uniform float enterTime;
uniform float leaveTime;

uniform int mode;
uniform float layers;
uniform float speed;
uniform float delay;
uniform float width;

#define W width
#define LAYERS 3.

vec4 readTex(vec2 uv) {
  if (uv.x < 0. || uv.x > 1. || uv.y < 0. || uv.y > 1.) {
    return vec4(0);
  }
  return texture2D(src, uv);
}

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(4859., 3985.))) * 3984.);
}

vec3 hsv2rgb(vec3 c) {
  vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

float sdBox(vec2 p, float r) {
  vec2 q = abs(p) - r;
  return min(length(q), max(q.y, q.x));
}

float dir = 1.;

float toRangeT(vec2 p, float scale) {
  float d;
  if (mode == 0) {
    d = p.x / (scale * 2.) + .5;
  }
  else if (mode == 1) {
    d = 1. - (p.y / (scale * 2.) + .5);
  }
  else if (mode == 2) {
    d = length(p) / scale;
  }
  d = dir > 0. ? d : (1. - d);
  return d;
}

vec4 cell(vec2 p, vec2 pi, float scale, float t, float edge) {
  vec2 pc = pi + .5;
  vec2 uvc = pc / scale;
  uvc.y /= resolution.y / resolution.x;
  uvc = uvc * 0.5 + 0.5;
  if (uvc.x < 0. || uvc.x > 1. || uvc.y < 0. || uvc.y > 1.) {
    return vec4(0);
  }
  float alpha = smoothstep(.0, .1, texture2D(src, uvc, 3.).a);
  vec4 color = vec4(hsv2rgb(vec3((pc.x * 13. / pc.y * 17.) * 0.3, 1, 1)), 1);
  float x = toRangeT(pi, scale);
  float n = hash(pi);
  float anim = smoothstep(W * 2., .0, abs(x + n * W - t));
  color *= anim;
  color *= mix(
    1.,
    clamp(.3 / abs(sdBox(p - pc, .5)), 0., 10.),
    edge * pow(anim, 10.)
  );
  return color * alpha;
}

vec4 cellsColor(vec2 p, float scale, float t) {
  vec2 pi = floor(p);
  vec2 d = vec2(0, 1);
  vec4 cc = vec4(0);
  cc += cell(p, pi, scale, t, .2) * 4.;
  cc += cell(p, pi + d.xy, scale, t, .9);
  cc += cell(p, pi - d.xy, scale, t, .9);
  cc += cell(p, pi + d.yx, scale, t, .9);
  cc += cell(p, pi - d.yx, scale, t, .9);
  return cc / 8.;
}

vec4 draw(vec2 uv, vec2 p, float t, float scale) {
  vec4 c = readTex(uv);
  vec2 pi = floor(p * scale);
  float n = hash(pi);
  t = t * (1. + W * 4.) - W * 2.;
  float x = toRangeT(pi, scale);
  float a1 = smoothstep(t, t - W, x + n * W);
  c *= a1;
  c += cellsColor(p * scale, scale, t) * 1.5;
  return c;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - offset) / resolution;
  vec2 p = uv * 2. - 1.;
  p.y *= resolution.y / resolution.x;

  float t;
  if (leaveTime > 0.) {
    dir = -1.;
    t = clamp(leaveTime * speed, 0., 1.);
  } else {
    t = clamp((enterTime - delay) * speed, 0., 1.);
  }
  t = (fract(t * .99999) - 0.5) * dir + 0.5;

  for (float i = 0.; i < LAYERS; i++) {
    float s = cos(i) * 7.3 + 10.;
    gl_FragColor += draw(uv, p, t, abs(s));
  }
  gl_FragColor /= LAYERS;
  gl_FragColor *= smoothstep(0., 0.01, t);
}
`;

  const getDataAttributes = (e) =>
    Object.entries(e.attributes).reduce((acc, [_, d]) => {
      if (d.name.match(/^data-(.*)$/) && d.value != null) {
        acc[RegExp.$1] = Number.parseFloat(d.value);
      }
      return acc;
    }, {});

  const vfx = new VFX();

  for (const e of document.querySelectorAll("img,h2")) {
    const data = getDataAttributes(e);

    vfx.add(e, {
      shader,
      overflow: 30,
      intersection: { threshold: 0.99 },
      uniforms: {
        mode: data.mode ?? 0,
        width: data.width ?? 0.2,
        layers: data.layers ?? 3,
        speed: data.speed ?? 0.75,
        delay: data.delay ?? 0,
      },
    });
  }
</script>
