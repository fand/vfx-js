<!DOCTYPE html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Depth Bokeh</title>

<style>
  html,
  body {
    height: 100%;
    margin: 0;
    background: #0a0a0a;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }
  #photo {
    max-width: 100vw;
    max-height: 100vh;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .hint {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.7);
    background: rgba(0, 0, 0, 0.4);
    padding: 6px 12px;
    border-radius: 999px;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }
</style>

<img id="photo" src="./img1.png" alt="" />
<div class="hint">Move to refocus &middot; tweak focal / aperture in the panel</div>

<script type="module">
  import { VFX } from "@vfx-js/core";
  import { Pane } from "https://esm.sh/tweakpane@4.0.5";

  const DEPTH_SRC = "./img1_depth.webp";

  // Depth Anything's Spectral_r ramp: far ~ purple-blue (hue ≈ 0.70),
  // through cyan/green/yellow, to near at magenta-red (hue ≈ 0.93).
  // The hue path wraps past 1.0, so walk CW from HUE_FAR and divide
  // by the total range. Pixels off the colormap arc get clamped to 0.
  const HUE_FAR = 0.70;
  const HUE_NEAR = 0.93;
  const HUE_RANGE = ((HUE_FAR - HUE_NEAR) % 1 + 1) % 1;
  const decodeDepthGLSL = `
    const float HUE_FAR = ${HUE_FAR};
    const float HUE_RANGE = ${HUE_RANGE};
    float decodeDepth(vec3 col) {
      float maxC = max(max(col.r, col.g), col.b);
      float minC = min(min(col.r, col.g), col.b);
      float dC = maxC - minC;
      float h = 0.0;
      if (dC > 1e-4) {
        if (maxC == col.r) h = mod((col.g - col.b) / dC, 6.0);
        else if (maxC == col.g) h = (col.b - col.r) / dC + 2.0;
        else h = (col.r - col.g) / dC + 4.0;
      }
      h /= 6.0;
      float phi = mod(HUE_FAR - h + 1.0, 1.0);
      if (phi > HUE_RANGE + 0.02) return 0.0;
      return clamp(phi / HUE_RANGE, 0.0, 1.0);
    }
  `;

  // Single-pass DoF. For each output pixel:
  //   - CoC = |depth - focal| * aperture
  //   - Disk kernel: golden-spiral disk, radius coc.
  //   - Swirl kernel: same samples remapped onto a tangentially
  //     elongated / radially narrow arc concentric to the image
  //     center, so highlights become curved streaks.
  // Each sample is taken at mix(diskPos, swirlPos, swirl) — a single
  // gather over a smoothly morphing kernel shape, not a blend of two
  // finished blurs.
  const BLUR_SAMPLES = 64;
  const FRAG_BLUR = `#version 300 es
    precision highp float;
    in vec2 uv;
    in vec2 uvSrc;
    uniform sampler2D src;
    uniform sampler2D depthTex;
    uniform vec2 dstSize;
    uniform float focal;
    uniform float aperture;
    uniform float swirl;
    out vec4 outColor;

    ${decodeDepthGLSL}

    void main() {
      float d = decodeDepth(texture(depthTex, uv).rgb);
      vec3 sharp = texture(src, uvSrc).rgb;
      float coc = abs(d - focal) * aperture;
      if (coc < 0.5) {
        outColor = vec4(sharp, 1.0);
        return;
      }
      // Hash for per-pixel rotation of the golden-spiral sample set;
      // breaks up concentric kernel banding into noise.
      float a0 = fract(sin(dot(uv * dstSize, vec2(12.9898, 78.233))) * 43758.5453) * 6.28318530;

      // Swirl kernel parameters. ASPECT > 1 stretches tangentially
      // (mapped to angular sweep) and shrinks radially. arcAng capped
      // to one radian so pixels near the image center don't wrap.
      const float SWIRL_ASPECT = 3.0;
      vec2 imgCenter = vec2(0.5);
      vec2 fromCpx = (uvSrc - imgCenter) * dstSize;
      float rPx = length(fromCpx);
      float baseAng = atan(fromCpx.y, fromCpx.x);
      float tangLen = coc * SWIRL_ASPECT;
      float radExt = coc / SWIRL_ASPECT;
      float arcAng = min(tangLen / max(rPx, 1.0), 1.0);

      vec3 acc = vec3(0.0);
      float weightSum = 0.0;
      for (int i = 0; i < ${BLUR_SAMPLES}; i++) {
        float t = (float(i) + 0.5) / float(${BLUR_SAMPLES});
        float r = sqrt(t);
        float a = a0 + float(i) * 2.39996323;
        float ux = cos(a) * r;
        float uy = sin(a) * r;

        vec2 diskPos = uvSrc + vec2(ux, uy) * coc / dstSize;

        float dAng = ux * arcAng;
        float newR = rPx + uy * radExt;
        vec2 swirlPos = imgCenter
          + newR * vec2(cos(baseAng + dAng), sin(baseAng + dAng)) / dstSize;

        vec2 sPos = mix(diskPos, swirlPos, swirl);
        float inB = step(0.0, sPos.x) * step(sPos.x, 1.0)
                  * step(0.0, sPos.y) * step(sPos.y, 1.0);

        // Sample contributes iff its own bokeh circle reaches this
        // pixel. Blocks in-focus foreground from bleeding into bg
        // gathers and vice versa.
        float depthS = decodeDepth(texture(depthTex, sPos).rgb);
        float cocS = abs(depthS - focal) * aperture;
        float distPx = length((sPos - uvSrc) * dstSize);
        float depthW = smoothstep(-1.0, 1.0, cocS - distPx);

        // OOB samples keep wDiv=1 so partial-OOB kernels still dim
        // (cat's-eye). Depth-rejected in-bounds samples drop out of
        // the divisor entirely so silhouettes don't get dark halos.
        float wAcc = inB * depthW;
        float wDiv = mix(1.0, depthW, inB);
        acc += texture(src, sPos).rgb * wAcc;
        weightSum += wDiv;
      }
      outColor = vec4(acc / max(weightSum, 1.0), 1.0);
    }
  `;

  class DepthBokehEffect {
    constructor() {
      this.focal = 0.65;
      this.aperture = 80.0;
      // 0 = pure disk blur, 1 = pure rotational/swirl blur around the
      // image centre. Anything in between cross-fades the two.
      this.swirl = 0;
      this._depthTex = null;
    }

    async init(ctx) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = DEPTH_SRC;
      await img.decode();
      this._depthTex = ctx.wrapTexture(img, {
        filter: "linear",
        wrap: "clamp",
      });
    }

    render(ctx) {
      if (!this._depthTex) return;
      ctx.draw({
        frag: FRAG_BLUR,
        target: ctx.target,
        uniforms: {
          src: ctx.src,
          depthTex: this._depthTex,
          dstSize: [ctx.dims.elementPixel[0], ctx.dims.elementPixel[1]],
          focal: this.focal,
          aperture: this.aperture,
          swirl: this.swirl,
        },
      });
    }

    dispose() {
      this._depthTex = null;
    }
  }

  function decodeDepthRGB(r, g, b) {
    const maxC = Math.max(r, g, b);
    const minC = Math.min(r, g, b);
    const dC = maxC - minC;
    let h = 0;
    if (dC > 1e-4) {
      if (maxC === r) h = (((g - b) / dC) % 6 + 6) % 6;
      else if (maxC === g) h = (b - r) / dC + 2;
      else h = (r - g) / dC + 4;
    }
    h /= 6;
    const phi = ((HUE_FAR - h) % 1 + 1) % 1;
    if (phi > HUE_RANGE + 0.02) return 0;
    return Math.min(1, Math.max(0, phi / HUE_RANGE));
  }

  window.addEventListener("load", async () => {
    const img = document.getElementById("photo");
    if (!img.complete) {
      await new Promise((r) => {
        img.onload = r;
      });
    }

    const depthImg = new Image();
    depthImg.src = DEPTH_SRC;
    await depthImg.decode();
    const dCanvas = document.createElement("canvas");
    dCanvas.width = depthImg.naturalWidth;
    dCanvas.height = depthImg.naturalHeight;
    const dCtx = dCanvas.getContext("2d", { willReadFrequently: true });
    dCtx.drawImage(depthImg, 0, 0);

    const vfx = new VFX();
    const effect = new DepthBokehEffect();
    await vfx.add(img, { effect });

    let target = effect.focal;
    function setFocalFromClient(cx, cy) {
      const r = img.getBoundingClientRect();
      const u = (cx - r.left) / r.width;
      const v = (cy - r.top) / r.height;
      if (u < 0 || u > 1 || v < 0 || v > 1) return;
      const x = Math.min(dCanvas.width - 1, Math.floor(u * dCanvas.width));
      const y = Math.min(dCanvas.height - 1, Math.floor(v * dCanvas.height));
      const [r8, g8, b8] = dCtx.getImageData(x, y, 1, 1).data;
      target = decodeDepthRGB(r8 / 255, g8 / 255, b8 / 255);
    }

    window.addEventListener("pointermove", (e) => {
      setFocalFromClient(e.clientX, e.clientY);
    });
    window.addEventListener("pointerdown", (e) => {
      setFocalFromClient(e.clientX, e.clientY);
    });

    // VFX-JS's canvas sits at z-index 9999, so mount the pane inside a
    // higher-z-index container to keep it interactive.
    const paneContainer = document.createElement("div");
    paneContainer.style.cssText =
      "position:fixed;top:16px;right:16px;width:280px;z-index:10000";
    document.body.appendChild(paneContainer);
    const pane = new Pane({ container: paneContainer, title: "Bokeh" });
    pane
      .addBinding(effect, "focal", { min: 0, max: 1, step: 0.001 })
      .on("change", () => {
        target = effect.focal;
      });
    pane.addBinding(effect, "aperture", { min: 0, max: 200, step: 1 });
    pane.addBinding(effect, "swirl", { min: 0, max: 1, step: 0.01 });

    (function tick() {
      effect.focal += (target - effect.focal) * 0.08;
      pane.refresh();
      requestAnimationFrame(tick);
    })();
  });
</script>
