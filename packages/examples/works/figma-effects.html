<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VFX-JS Figma Effects</title>
<style>
  :root{
    --bg:#ffffff; --stage:#f4f4f5; --panel:#ffffff; --ink:#111111;
    --muted:#6b7280; --line:#e6e6e6; --accent:#0fd969; --accent-tint:rgba(15,217,105,.12);
    --topbar-h:52px; --side-w:220px; --footer-h:200px;
    --sans:"Inter","Figma Sans VF",system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;}

  /* VFX-JS's canvas defaults to z-index 9999, so all UI sits above it. */
  .topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:10002;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;background:var(--bg);border-bottom:1px solid var(--line);}
  .brand{font-size:.92rem;letter-spacing:.02em;}
  .brand b{font-weight:700;}
  .brand span{color:var(--muted);font-weight:500;margin-left:6px;
    text-transform:uppercase;letter-spacing:.14em;font-size:.74rem;}
  .cta{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;
    border-radius:999px;background:var(--ink);color:#fff;text-decoration:none;
    font-size:.78rem;font-weight:600;letter-spacing:.02em;}
  .cta:hover{background:#000;}

  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--side-w);
    z-index:10000;background:var(--panel);border-right:1px solid var(--line);
    padding:18px 14px;overflow:auto;}
  .side-title{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 2px 10px;}
  .side-btn{display:flex;justify-content:space-between;align-items:center;width:100%;
    padding:10px 12px;margin-bottom:6px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel);color:var(--ink);font:inherit;font-size:.85rem;font-weight:500;
    text-align:left;cursor:pointer;transition:border-color .12s,background .12s;}
  .side-btn:hover{border-color:var(--accent);background:var(--accent-tint);}
  .side-btn .plus{color:var(--muted);font-size:1.05rem;line-height:1;}
  .side-btn:hover .plus{color:var(--accent);}

  .stage{position:fixed;top:var(--topbar-h);left:var(--side-w);right:0;bottom:var(--footer-h);
    display:grid;place-items:center;padding:40px 40px 40px 40px;background:var(--stage);}
  .frame{background:#fff;border:1px solid var(--line);border-radius:4px;padding:8px;
    line-height:0;}
  .frame img{display:block;max-width:62vw;max-height:78vh;border-radius:4px;}

  .pane{position:fixed;top:calc(var(--topbar-h) + 16px);right:16px;width:300px;z-index:10000;
    max-height:calc(100vh - var(--topbar-h) - var(--footer-h) - 32px);overflow:auto;
    /* Tweakpane light theme */
    --tp-base-background-color:#ffffff;--tp-base-shadow-color:rgba(0,0,0,.1);
    --tp-button-background-color:#f0f0f0;--tp-button-background-color-active:#d8d8d8;
    --tp-button-background-color-focus:#e4e4e4;--tp-button-background-color-hover:#e8e8e8;
    --tp-button-foreground-color:#111111;
    --tp-container-background-color:#f6f6f6;--tp-container-background-color-active:#e2e2e2;
    --tp-container-background-color-focus:#ececec;--tp-container-background-color-hover:#efefef;
    --tp-container-foreground-color:#333333;--tp-groove-foreground-color:#e2e2e2;
    --tp-input-background-color:#f0f0f0;--tp-input-background-color-active:#e2e2e2;
    --tp-input-background-color-focus:#e8e8e8;--tp-input-background-color-hover:#ececec;
    --tp-input-foreground-color:#111111;--tp-label-foreground-color:#555555;
    --tp-monitor-background-color:#f0f0f0;--tp-monitor-foreground-color:#333333;}

  /* Active effect stack — drag items to reorder the apply order. */
  .stack-item{display:flex;align-items:center;gap:8px;padding:9px 10px;
    margin-bottom:6px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel);font-size:.82rem;cursor:grab;}
  .stack-item.dragging{opacity:.4;}
  .stack-item.drop-before{border-top-color:var(--accent);}
  .stack-item.drop-after{border-bottom-color:var(--accent);}
  .stack-item .grip{color:var(--muted);cursor:grab;}
  .stack-item .si-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stack-item .si-rm{border:none;background:transparent;color:var(--muted);
    font:inherit;font-size:1rem;line-height:1;cursor:pointer;padding:0 2px;}
  .stack-item .si-rm:hover{color:#e5484d;}
  .stack-empty{font-size:.7rem;color:var(--muted);margin:2px 2px;}

  /* Footer: live VFX-JS code snippet for the current effect stack. */
  .footer{position:fixed;left:var(--side-w);right:0;bottom:0;height:var(--footer-h);
    z-index:10001;display:flex;flex-direction:column;
    background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;}
  .footer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .copy-btn{height:28px;padding:0 12px;border:1px solid var(--line);border-radius:999px;
    background:var(--panel);color:var(--ink);font:inherit;font-size:.74rem;font-weight:600;
    cursor:pointer;transition:border-color .12s,background .12s;}
  .copy-btn:hover{border-color:var(--accent);background:var(--accent-tint);}
  .code{flex:1;overflow:auto;margin:0;background:#f6f6f6;border:1px solid var(--line);
    border-radius:8px;padding:12px 14px;}
  .code code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:.78rem;line-height:1.5;color:#111;white-space:pre;}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><b>VFX-JS</b><span>Shader Effects</span></div>
  <a class="cta" href="https://github.com/fand/vfx-js" target="_blank" rel="noopener">GitHub ↗</a>
</header>
<aside class="sidebar" id="sidebar">
  <div class="side-title">Add effect</div>
  <div id="palette"></div>
  <div class="side-title" style="margin-top:22px">Order · drag to sort</div>
  <div id="stack-list"></div>
</aside>
<main class="stage"><div class="frame"><img id="target" alt="effect target"></div></main>
<div class="pane" id="pane"></div>
<footer class="footer">
  <div class="footer-head">
    <span class="side-title" style="margin:0">Code</span>
    <button class="copy-btn" id="copy-btn">Copy</button>
  </div>
  <pre class="code"><code id="snippet"></code></pre>
</footer>

<script type="module">
import { VFX } from "@vfx-js/core";
import {
  ColoredEdgesEffect,
  DitherEffect,
  FigmaPixelateEffect,
  GradientMapEffect,
  HalftoneEffect,
  PatternRefractionEffect,
  PixelStretchEffect,
  SliceShiftEffect,
  WarpEffect,
} from "@vfx-js/effects";
import { Pane } from "tweakpane";

// Bundled sample images. The first one loads on start.
const IMAGES = {
  Sculpt: new URL("./pixelsort/sculpt.webp", import.meta.url).href,
  Tower: new URL("./pixelsort/tower1.webp", import.meta.url).href,
  City: new URL("./pixelsort/city1.webp", import.meta.url).href,
  Octopus: new URL("./pixelsort/octo.webp", import.meta.url).href,
};

// A control descriptor drives one Tweakpane binding. `options` makes a
// list, `color` a color picker, `min/max` a slider; booleans bind as-is.
const slider = (min, max, step) => ({ min, max, step });

const EFFECTS = {
  Warp: {
    make: () => new WarpEffect(),
    controls: {
      type: { options: ["sine", "twist", "bulge", "pinch", "ripple", "flag", "squeeze", "swirl"] },
      amplitude: slider(-10, 10, 0.1),
      frequency: slider(0.1, 10, 0.1),
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      speed: slider(0, 5, 0.05),
    },
  },
  "Slice shift": {
    make: () => new SliceShiftEffect(),
    controls: {
      shift: slider(-1, 1, 0.01),
      softness: slider(0, 1, 0.01),
      random: slider(0, 1, 0.01),
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      sliceCount: slider(1, 300, 1),
      angle: slider(-180, 180, 1),
    },
  },
  "Pixel stretch": {
    make: () => new PixelStretchEffect(),
    controls: {
      offset: slider(-1, 1, 0.01),
      reach: slider(0, 1, 0.01),
      smoothness: slider(0, 1, 0.01),
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      angle: slider(-180, 180, 1),
    },
  },
  "Pattern refraction": {
    make: () => new PatternRefractionEffect(),
    controls: {
      pattern: { options: ["lenticular", "waves", "circular"] },
      strength: slider(0, 2, 0.01),
      smoothness: slider(0, 1, 0.01),
      frost: slider(0, 2, 0.01),
      dispersion: slider(0, 1, 0.01),
      edgeWrap: { options: ["zero", "clamp", "repeat", "mirror"] },
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      count: slider(1, 100, 1),
      angle: slider(-180, 180, 1),
    },
  },
  Pixelate: {
    make: () => new FigmaPixelateEffect(),
    controls: {
      shape: { options: ["rectangle", "ellipse", "hexagon", "triangle"] },
      size: slider(2, 80, 1),
      stretch: slider(0.2, 4, 0.1),
      gap: slider(0, 1, 0.01),
      colorTrim: slider(0, 8, 1),
      averageColor: slider(0, 1, 0.01),
      dissolve: slider(0, 1, 0.01),
      falloff: slider(0, 1, 0.01),
      knockout: {},
    },
  },
  Dither: {
    make: () => new DitherEffect(),
    controls: {
      style: { options: ["bayer2", "bayer4", "bayer8", "bayer16", "blueNoise", "threshold"] },
      size: slider(1, 16, 1),
      levels: slider(2, 16, 1),
      brightness: slider(0, 2, 0.01),
      contrast: slider(0, 4, 0.05),
      mono: {},
      monoColor: { color: true },
    },
  },
  Halftone: {
    make: () => new HalftoneEffect(),
    controls: {
      gridSize: slider(2, 80, 1),
      dotSize: slider(0, 2, 0.05),
      smoothing: slider(0, 1, 0.01),
      angle: slider(-180, 180, 1),
      mode: { options: ["rgb", "cmyk"] },
      blackAmount: slider(0, 1, 0.01),
      trimEdge: {},
    },
  },
  "Colored edges": {
    make: () => new ColoredEdgesEffect(),
    controls: {
      threshold: slider(0, 1, 0.01),
      thickness: slider(0.5, 10, 0.5),
      intensity: slider(0, 20, 0.1),
      opacity: slider(0, 1, 0.01),
      color1: { color: true },
      color2: { color: true },
      background: { color: true },
    },
  },
  "Gradient map": {
    make: () => new GradientMapEffect(),
    // `colorStops` adds N gradient color pickers bound to params.colors.
    colorStops: 3,
    controls: {
      scatter: slider(0, 1, 0.01),
      offset: slider(0, 1, 0.01),
      repeat: { options: ["none", "repeat", "mirror"] },
      frequency: slider(1, 8, 1),
      mixSpace: { options: ["srgb", "linear", "oklab"] },
      speed: slider(-1, 1, 0.01),
    },
  },
};

const img = document.getElementById("target");
const vfx = new VFX();

const state = { Image: "Sculpt" };
// The active effect stack, applied in array order (last = on top).
const stack = [];
let nextUid = 1;
let added = false;
let pane = null;

// Tweakpane turns a string key like "edgeWrap" into "Edge wrap"; a list
// option label maps to itself.
function tpOptions(values) {
  const o = {};
  for (const v of values) o[v] = v;
  return o;
}

function loadImage(src) {
  return new Promise((resolve) => {
    img.onload = () => resolve();
    img.src = src;
  });
}

function bindControl(folder, params, key, cfg) {
  if (cfg.options) {
    folder.addBinding(params, key, { options: tpOptions(cfg.options) });
  } else if (typeof cfg.min === "number") {
    folder.addBinding(params, key, cfg);
  } else {
    // Colors (hex strings), booleans, and plain values bind as-is.
    folder.addBinding(params, key);
  }
}

function buildPane() {
  pane?.dispose();
  pane = new Pane({ container: document.getElementById("pane"), title: "Parameters" });

  pane.addBinding(state, "Image", { options: tpOptions(Object.keys(IMAGES)) })
    .on("change", async (ev) => {
      await loadImage(IMAGES[ev.value]);
      await mount();
    });
  pane.addButton({ title: "Upload image…" }).on("click", () => fileInput.click());
  pane.addBlade({ view: "separator" });

  // One folder of params per applied effect (order/remove live in the
  // sidebar stack list).
  stack.forEach((entry, i) => {
    const def = EFFECTS[entry.key];
    const folder = pane.addFolder({ title: `${i + 1} · ${entry.key}`, expanded: true });
    if (def.colorStops) bindGradientStops(folder, entry.effect, def.colorStops);
    for (const [key, cfg] of Object.entries(def.controls)) {
      bindControl(folder, entry.effect.params, key, cfg);
    }
  });

  // Any param edit refreshes the generated snippet.
  pane.on("change", updateSnippet);
}

// Format a JS literal for a param value.
function formatValue(v) {
  if (Array.isArray(v)) return `[${v.map(formatValue).join(", ")}]`;
  return JSON.stringify(v);
}

// Params that differ from the effect's defaults, so the snippet only
// shows what the user actually changed.
function changedParams(effect) {
  const cur = effect.params;
  const def = new effect.constructor().params;
  const out = {};
  for (const k of Object.keys(cur)) {
    if (JSON.stringify(cur[k]) !== JSON.stringify(def[k])) out[k] = cur[k];
  }
  return out;
}

// Build a copy-pasteable VFX-JS snippet from the active stack.
function genSnippet() {
  if (stack.length === 0) return "// Add an effect to generate code.";
  const names = [...new Set(stack.map((s) => s.effect.constructor.name))];
  const lines = stack.map((s) => {
    const cls = s.effect.constructor.name;
    const diff = changedParams(s.effect);
    const keys = Object.keys(diff);
    if (keys.length === 0) return `    new ${cls}(),`;
    const args = keys.map((k) => `${k}: ${formatValue(diff[k])}`).join(", ");
    return `    new ${cls}({ ${args} }),`;
  });
  return [
    `import { VFX } from "@vfx-js/core";`,
    `import { ${names.join(", ")} } from "@vfx-js/effects";`,
    ``,
    `const vfx = new VFX();`,
    `vfx.add(img, {`,
    `  effect: [`,
    ...lines,
    `  ],`,
    `});`,
  ].join("\n");
}

let snippetText = "";
function updateSnippet() {
  snippetText = genSnippet();
  document.getElementById("snippet").textContent = snippetText;
}

// Add N color pickers for a gradient effect, writing back to params.colors.
function bindGradientStops(folder, effect, n) {
  const proxy = {};
  for (let i = 0; i < n; i++) {
    proxy[`stop${i}`] = effect.params.colors[i] ?? "#ffffff";
  }
  const sync = () => {
    effect.params.colors = Array.from({ length: n }, (_, i) => proxy[`stop${i}`]);
  };
  for (let i = 0; i < n; i++) {
    folder.addBinding(proxy, `stop${i}`, { label: `color ${i + 1}` }).on("change", sync);
  }
}

// The sidebar stack list: the applied effects in apply order, draggable
// to reorder, each with a remove button.
let dragUid = null;
function buildStackList() {
  stackListEl.innerHTML = "";
  if (stack.length === 0) {
    const empty = document.createElement("div");
    empty.className = "stack-empty";
    empty.textContent = "No effects yet.";
    stackListEl.appendChild(empty);
    return;
  }
  stack.forEach((entry, i) => {
    const item = document.createElement("div");
    item.className = "stack-item";
    item.draggable = true;
    item.innerHTML =
      `<span class="grip">⠿</span>` +
      `<span class="si-name">${i + 1} · ${entry.key}</span>` +
      `<button class="si-rm" title="Remove">×</button>`;

    item.addEventListener("dragstart", (e) => {
      dragUid = entry.uid;
      e.dataTransfer.effectAllowed = "move";
      item.classList.add("dragging");
    });
    item.addEventListener("dragend", () => item.classList.remove("dragging"));
    item.addEventListener("dragover", (e) => {
      e.preventDefault();
      const r = item.getBoundingClientRect();
      const after = e.clientY - r.top > r.height / 2;
      item.classList.toggle("drop-after", after);
      item.classList.toggle("drop-before", !after);
    });
    item.addEventListener("dragleave", () =>
      item.classList.remove("drop-before", "drop-after"),
    );
    item.addEventListener("drop", (e) => {
      e.preventDefault();
      const r = item.getBoundingClientRect();
      const after = e.clientY - r.top > r.height / 2;
      item.classList.remove("drop-before", "drop-after");
      reorderEffect(dragUid, entry.uid, after);
    });

    item.querySelector(".si-rm").addEventListener("click", () =>
      removeEffect(entry.uid),
    );
    stackListEl.appendChild(item);
  });
}

// Move the dragged effect to just before/after the drop target.
function reorderEffect(fromUid, toUid, after) {
  if (fromUid == null || fromUid === toUid) return;
  const from = stack.findIndex((s) => s.uid === fromUid);
  if (from < 0) return;
  const [moved] = stack.splice(from, 1);
  let to = stack.findIndex((s) => s.uid === toUid);
  if (after) to += 1;
  stack.splice(to, 0, moved);
  mount();
}

// Rebuild the VFX pipeline from the current stack, then the pane.
// Serialized: a remove + re-add must finish before the next runs, or VFX
// rejects the re-attached effect instances ("already attached").
let mountChain = Promise.resolve();
function mount() {
  mountChain = mountChain.then(doMount);
  return mountChain;
}
async function doMount() {
  if (added) {
    vfx.remove(img);
    added = false;
  }
  if (stack.length > 0) {
    await vfx.add(img, { effect: stack.map((s) => s.effect) });
    added = true;
  }
  buildStackList();
  buildPane();
  updateSnippet();
}

function addEffect(key) {
  stack.push({ key, uid: nextUid++, effect: EFFECTS[key].make() });
  mount();
}

function removeEffect(uid) {
  const i = stack.findIndex((s) => s.uid === uid);
  if (i >= 0) stack.splice(i, 1);
  mount();
}

// Build the left sidebar palette: one button per effect, click to append.
const paletteEl = document.getElementById("palette");
const stackListEl = document.getElementById("stack-list");
for (const key of Object.keys(EFFECTS)) {
  const btn = document.createElement("button");
  btn.className = "side-btn";
  btn.innerHTML = `<span>${key}</span><span class="plus">+</span>`;
  btn.addEventListener("click", () => addEffect(key));
  paletteEl.appendChild(btn);
}

// Hidden input for local file uploads.
const fileInput = document.createElement("input");
fileInput.type = "file";
fileInput.accept = "image/*";
fileInput.style.display = "none";
document.body.appendChild(fileInput);
fileInput.addEventListener("change", async () => {
  const f = fileInput.files?.[0];
  if (!f) return;
  await loadImage(URL.createObjectURL(f));
  await mount();
});

const copyBtn = document.getElementById("copy-btn");
copyBtn.addEventListener("click", async () => {
  await navigator.clipboard.writeText(snippetText);
  copyBtn.textContent = "Copied";
  setTimeout(() => (copyBtn.textContent = "Copy"), 1200);
});

await loadImage(IMAGES[state.Image]);
addEffect("Warp");
</script>
</body>
</html>
