<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VFX-JS Figma Effects</title>
<style>
  :root{
    --bg:#ffffff; --stage:#f4f4f5; --panel:#ffffff; --ink:#111111;
    --muted:#6b7280; --line:#e6e6e6; --accent:#0fd969; --accent-tint:rgba(15,217,105,.12);
    --topbar-h:52px; --side-w:220px; --footer-h:320px;
    --sans:"Inter","Figma Sans VF",system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;}

  /* VFX-JS's canvas defaults to z-index 9999, so all UI sits above it. */
  .topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:10002;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;background:#DDFF22;border-bottom:1px solid rgba(0,0,0,.12);}
  .brand{display:flex;align-items:center;gap:10px;font-size:.92rem;letter-spacing:.02em;}
  .brand .logo{height:40px;display:block;}
  .brand span{color:var(--muted);font-weight:500;margin-left:6px;
    text-transform:uppercase;letter-spacing:.14em;font-size:.74rem;}
  .cta{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;
    border-radius:999px;background:var(--ink);color:#fff;text-decoration:none;
    font-size:.78rem;font-weight:600;letter-spacing:.02em;}
  .cta:hover{background:#000;}

  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--side-w);
    z-index:10000;background:var(--panel);border-right:1px solid var(--line);
    padding:18px 14px;overflow:auto;}
  .side-title{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 2px 10px;}
  /* Effect toggles — click to enable/disable, drag to reorder apply order. */
  .side-btn{position:relative;display:flex;align-items:center;gap:8px;width:100%;
    padding:10px 12px;margin-bottom:6px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel);color:var(--ink);font:inherit;font-size:.85rem;font-weight:500;
    text-align:left;cursor:grab;transition:border-color .12s,background .12s;}
  .side-btn:hover{border-color:var(--accent);}
  .side-btn .grip{color:var(--muted);font-size:.9rem;}
  .side-btn .label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .side-btn .mark{width:1em;text-align:center;color:var(--muted);font-size:1.05rem;line-height:1;}
  .side-btn.active{border-color:var(--accent);background:var(--accent-tint);}
  .side-btn.active .mark{color:var(--accent);}
  .side-btn.dragging{opacity:.4;}
  .side-btn.drop-before::after,.side-btn.drop-after::after{content:"";
    position:absolute;left:0;right:0;height:3px;border-radius:999px;
    background:var(--accent);box-shadow:0 0 0 2px var(--accent-tint);}
  .side-btn.drop-before::after{top:-5px;}
  .side-btn.drop-after::after{bottom:-5px;}

  .stage{position:fixed;top:var(--topbar-h);left:var(--side-w);right:0;bottom:var(--footer-h);
    display:grid;place-items:center;padding:40px 40px 40px 40px;background:var(--stage);}
  .frame{background:#fff;border:1px solid var(--line);border-radius:4px;padding:8px;
    line-height:0;}
  .frame img,.frame video{display:block;max-width:62vw;max-height:78vh;border-radius:4px;}
  .frame [hidden]{display:none;}

  .pane{position:fixed;top:calc(var(--topbar-h) + 16px);right:16px;width:300px;z-index:10000;
    max-height:calc(100vh - var(--topbar-h) - var(--footer-h) - 32px);overflow:auto;
    /* Tweakpane light theme */
    --tp-base-background-color:#ffffff;--tp-base-shadow-color:rgba(0,0,0,.1);
    --tp-button-background-color:#f0f0f0;--tp-button-background-color-active:#d8d8d8;
    --tp-button-background-color-focus:#e4e4e4;--tp-button-background-color-hover:#e8e8e8;
    --tp-button-foreground-color:#111111;
    --tp-container-background-color:#f6f6f6;--tp-container-background-color-active:#e2e2e2;
    --tp-container-background-color-focus:#ececec;--tp-container-background-color-hover:#efefef;
    --tp-container-foreground-color:#333333;--tp-groove-foreground-color:#e2e2e2;
    --tp-input-background-color:#f0f0f0;--tp-input-background-color-active:#e2e2e2;
    --tp-input-background-color-focus:#e8e8e8;--tp-input-background-color-hover:#ececec;
    --tp-input-foreground-color:#111111;--tp-label-foreground-color:#555555;
    --tp-monitor-background-color:#f0f0f0;--tp-monitor-foreground-color:#333333;}


  /* Footer: live VFX-JS code snippet for the current effect stack. */
  .footer{position:fixed;left:var(--side-w);right:0;bottom:0;height:var(--footer-h);
    z-index:10001;display:flex;flex-direction:column;
    background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;}
  .footer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .copy-btn{height:28px;padding:0 12px;border:1px solid var(--line);border-radius:999px;
    background:var(--panel);color:var(--ink);font:inherit;font-size:.74rem;font-weight:600;
    cursor:pointer;transition:border-color .12s,background .12s;}
  .copy-btn:hover{border-color:var(--accent);background:var(--accent-tint);}
  .code{flex:1;overflow-y:scroll;overflow-x:auto;margin:0;background:#1c1c22;
    border:1px solid #2a2a32;border-radius:8px;padding:12px 14px;}
  /* Force an always-visible scrollbar (macOS overlay bars hide otherwise). */
  .code::-webkit-scrollbar{width:10px;height:10px;}
  .code::-webkit-scrollbar-track{background:transparent;}
  .code::-webkit-scrollbar-thumb{background:#45454f;border-radius:999px;
    border:2px solid #1c1c22;}
  .code::-webkit-scrollbar-thumb:hover{background:#5a5a66;}
  .code code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:.78rem;line-height:1.5;color:#e6e6e6;white-space:pre;}
  .t-com{color:#6a9955;}.t-str{color:#ce9178;}.t-kw{color:#569cd6;}
  .t-num{color:#b5cea8;}.t-cls{color:#4ec9b0;}.t-prop{color:#9cdcfe;}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><img class="logo" src="./vfx-js-logo.svg" alt="VFX-JS"><span>Shader Effects</span></div>
  <a class="cta" href="https://github.com/fand/vfx-js" target="_blank" rel="noopener">GitHub ↗</a>
</header>
<aside class="sidebar" id="sidebar">
  <div class="side-title">Effects · click to toggle, drag to sort</div>
  <div id="effect-list"></div>
</aside>
<main class="stage"><div class="frame">
  <img id="target" alt="effect target">
  <video id="targetVideo" muted loop playsinline hidden></video>
</div></main>
<div class="pane" id="pane"></div>
<footer class="footer">
  <div class="footer-head">
    <span class="side-title" style="margin:0">Code</span>
    <button class="copy-btn" id="copy-btn">Copy</button>
  </div>
  <pre class="code"><code id="snippet"></code></pre>
</footer>

<script type="module">
import { VFX } from "@vfx-js/core";
import {
  ColoredEdgesEffect,
  DitherEffect,
  FigmaPixelateEffect,
  GradientMapEffect,
  HalftoneEffect,
  PatternRefractionEffect,
  PixelStretchEffect,
  SliceShiftEffect,
  WarpEffect,
} from "@vfx-js/effects";
import { Pane } from "tweakpane";

// Source media. Images load into <img>; video/webcam into <video>. The
// first one loads on start.
const MEDIA = {
  Sculpt: { type: "image", src: new URL("./pixelsort/sculpt.webp", import.meta.url).href },
  Tower: { type: "image", src: new URL("./pixelsort/tower1.webp", import.meta.url).href },
  City: { type: "image", src: new URL("./pixelsort/city1.webp", import.meta.url).href },
  Octopus: { type: "image", src: new URL("./pixelsort/octo.webp", import.meta.url).href },
  Debug: { type: "image", src: new URL("./debug.png", import.meta.url).href },
  "jellyfish (video)": { type: "video", src: new URL("./jellyfish.mp4", import.meta.url).href },
  Webcam: { type: "webcam" },
};

// A control descriptor drives one Tweakpane binding. `options` makes a
// list, `color` a color picker, `min/max` a slider; booleans bind as-is.
const slider = (min, max, step) => ({ min, max, step });

const EFFECTS = {
  Warp: {
    make: () => new WarpEffect(),
    controls: {
      type: { options: ["sine", "twist", "bulge", "pinch", "ripple", "flag", "squeeze", "swirl"] },
      amplitude: slider(-10, 10, 0.1),
      frequency: slider(0.1, 10, 0.1),
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      speed: slider(0, 5, 0.05),
    },
  },
  "Slice shift": {
    make: () => new SliceShiftEffect(),
    controls: {
      shift: slider(-1, 1, 0.01),
      softness: slider(0, 1, 0.01),
      random: slider(0, 1, 0.01),
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      sliceCount: slider(1, 300, 1),
      angle: slider(-180, 180, 1),
    },
  },
  "Pixel stretch": {
    make: () => new PixelStretchEffect(),
    controls: {
      offset: slider(-1, 1, 0.01),
      reach: slider(0, 1, 0.01),
      smoothness: slider(0, 1, 0.01),
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      angle: slider(-180, 180, 1),
    },
  },
  "Pattern refraction": {
    make: () => new PatternRefractionEffect(),
    controls: {
      pattern: { options: ["lenticular", "waves", "circular"] },
      strength: slider(0, 2, 0.01),
      smoothness: slider(0, 1, 0.01),
      frost: slider(0, 2, 0.01),
      dispersion: slider(0, 1, 0.01),
      edgeWrap: { options: ["zero", "clamp", "repeat", "mirror"] },
      centerX: slider(0, 1, 0.01),
      centerY: slider(0, 1, 0.01),
      stripWidth: slider(0.02, 1, 0.01),
      angle: slider(-180, 180, 1),
    },
  },
  Pixelate: {
    make: () => new FigmaPixelateEffect(),
    controls: {
      shape: { options: ["rectangle", "ellipse", "hexagon", "triangle"] },
      size: slider(2, 80, 1),
      stretch: slider(0.2, 4, 0.1),
      gap: slider(0, 1, 0.01),
      colorTrim: slider(0, 8, 1),
      averageColor: slider(0, 1, 0.01),
      dissolve: slider(0, 1, 0.01),
      falloff: slider(0, 1, 0.01),
      knockout: {},
    },
  },
  Dither: {
    make: () => new DitherEffect(),
    controls: {
      style: { options: ["bayer2", "bayer4", "bayer8", "bayer16", "blueNoise", "threshold"] },
      size: slider(1, 16, 1),
      levels: slider(2, 16, 1),
      brightness: slider(0, 2, 0.01),
      contrast: slider(0, 4, 0.05),
      mono: {},
      monoColor: { color: true },
    },
  },
  Halftone: {
    make: () => new HalftoneEffect(),
    controls: {
      gridSize: slider(2, 80, 1),
      dotSize: slider(0, 2, 0.05),
      smoothing: slider(0, 1, 0.01),
      angle: slider(-180, 180, 1),
      mode: { options: ["rgb", "cmyk"] },
      blackAmount: slider(0, 1, 0.01),
      trimEdge: {},
    },
  },
  "Colored edges": {
    make: () => new ColoredEdgesEffect(),
    controls: {
      threshold: slider(0, 1, 0.01),
      thickness: slider(0.5, 10, 0.5),
      intensity: slider(0, 20, 0.1),
      opacity: slider(0, 1, 0.01),
      color1: { color: true },
      color2: { color: true },
      background: { color: true },
    },
  },
  "Gradient map": {
    make: () => new GradientMapEffect(),
    // `colorStops` adds N gradient color pickers bound to params.colors.
    colorStops: 3,
    controls: {
      scatter: slider(0, 1, 0.01),
      offset: slider(0, 1, 0.01),
      repeat: { options: ["none", "repeat", "mirror"] },
      frequency: slider(1, 8, 1),
      mixSpace: { options: ["srgb", "linear", "oklab"] },
      speed: slider(-1, 1, 0.01),
    },
  },
};

const img = document.getElementById("target");
const video = document.getElementById("targetVideo");
const vfx = new VFX();

const state = { Source: "Sculpt" };
// All effects as an ordered list. `active` toggles inclusion; the list
// order is the apply order (last = on top). Instances are lazy.
const items = Object.keys(EFFECTS).map((key, i) => ({
  key,
  uid: i + 1,
  active: false,
  effect: null,
}));
const activeItems = () => items.filter((it) => it.active);
// The element currently registered with VFX (img or video), or null.
let addedEl = null;
// The element the next mount should use.
let activeEl = img;
let webcamStream = null;
let pane = null;

// Tweakpane turns a string key like "edgeWrap" into "Edge wrap"; a list
// option label maps to itself.
function tpOptions(values) {
  const o = {};
  for (const v of values) o[v] = v;
  return o;
}

function stopWebcam() {
  if (webcamStream) {
    for (const t of webcamStream.getTracks()) t.stop();
    webcamStream = null;
  }
}

// Show <img>, hide <video>, and load an image source.
function loadImage(src) {
  stopWebcam();
  video.hidden = true;
  video.removeAttribute("src");
  img.hidden = false;
  activeEl = img;
  return new Promise((resolve) => {
    img.onload = () => resolve();
    img.src = src;
  });
}

// Show <video>, hide <img>, and play a file or the webcam stream.
async function loadVideo(srcOrStream, isStream) {
  img.hidden = true;
  video.hidden = false;
  activeEl = video;
  if (isStream) {
    video.srcObject = srcOrStream;
    video.removeAttribute("src");
  } else {
    stopWebcam();
    video.srcObject = null;
    video.src = srcOrStream;
  }
  await new Promise((resolve) => {
    video.onloadeddata = () => resolve();
    video.load();
  });
  await video.play().catch(() => {});
}

// Load a named source from MEDIA (image / video / webcam).
async function loadSource(name) {
  const m = MEDIA[name];
  if (!m) return;
  if (m.type === "image") {
    await loadImage(m.src);
  } else if (m.type === "video") {
    await loadVideo(m.src, false);
  } else if (m.type === "webcam") {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    webcamStream = stream;
    await loadVideo(stream, true);
  }
}

function bindControl(folder, params, key, cfg) {
  if (cfg.options) {
    folder.addBinding(params, key, { options: tpOptions(cfg.options) });
  } else if (typeof cfg.min === "number") {
    folder.addBinding(params, key, cfg);
  } else {
    // Colors (hex strings), booleans, and plain values bind as-is.
    folder.addBinding(params, key);
  }
}

function buildPane() {
  pane?.dispose();
  pane = new Pane({ container: document.getElementById("pane"), title: "Parameters" });

  pane.addBinding(state, "Source", { options: tpOptions(Object.keys(MEDIA)) })
    .on("change", async (ev) => {
      try {
        await loadSource(ev.value);
      } catch (err) {
        console.error("Failed to load source:", err);
      }
      await mount();
    });
  pane.addButton({ title: "Upload image…" }).on("click", () => fileInput.click());
  pane.addBlade({ view: "separator" });

  // One folder of params per applied effect (order/remove live in the
  // sidebar stack list).
  activeItems().forEach((entry, i) => {
    const def = EFFECTS[entry.key];
    const folder = pane.addFolder({ title: `${i + 1} · ${entry.key}`, expanded: true });
    if (def.colorStops) bindGradientStops(folder, entry.effect, def.colorStops);
    for (const [key, cfg] of Object.entries(def.controls)) {
      bindControl(folder, entry.effect.params, key, cfg);
    }
  });

  // Any param edit refreshes the generated snippet.
  pane.on("change", updateSnippet);
}

// Format a JS literal for a param value.
function formatValue(v) {
  if (Array.isArray(v)) return `[${v.map(formatValue).join(", ")}]`;
  return JSON.stringify(v);
}

// Params that differ from the effect's defaults, so the snippet only
// shows what the user actually changed.
function changedParams(effect) {
  const cur = effect.params;
  const def = new effect.constructor().params;
  const out = {};
  for (const k of Object.keys(cur)) {
    if (JSON.stringify(cur[k]) !== JSON.stringify(def[k])) out[k] = cur[k];
  }
  return out;
}

// Build a copy-pasteable VFX-JS snippet from the active stack.
function genSnippet() {
  const active = activeItems();
  if (active.length === 0) return "// Enable an effect to generate code.";
  const names = [...new Set(active.map((s) => s.effect.constructor.name))];
  const lines = active.map((s) => {
    const cls = s.effect.constructor.name;
    const diff = changedParams(s.effect);
    const keys = Object.keys(diff);
    if (keys.length === 0) return `    new ${cls}(),`;
    const args = keys.map((k) => `${k}: ${formatValue(diff[k])}`).join(", ");
    return `    new ${cls}({ ${args} }),`;
  });
  return [
    `import { VFX } from "@vfx-js/core";`,
    `import { ${names.join(", ")} } from "@vfx-js/effects";`,
    ``,
    `const vfx = new VFX();`,
    `vfx.add(element, {`,
    `  effect: [`,
    ...lines,
    `  ],`,
    `});`,
  ].join("\n");
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Minimal JS highlighter for the generated snippet (known small grammar).
const TOKEN =
  /(\/\/[^\n]*)|("(?:[^"\\]|\\.)*")|\b(import|from|const|new)\b|\b(\d+(?:\.\d+)?)\b|([A-Z][A-Za-z0-9]*)|([A-Za-z_]\w*)(?=\s*:)/g;
function highlight(code) {
  return escapeHtml(code).replace(
    TOKEN,
    (m, com, str, kw, num, cls, prop) => {
      if (com) return `<span class="t-com">${com}</span>`;
      if (str) return `<span class="t-str">${str}</span>`;
      if (kw) return `<span class="t-kw">${kw}</span>`;
      if (num) return `<span class="t-num">${num}</span>`;
      if (cls) return `<span class="t-cls">${cls}</span>`;
      if (prop) return `<span class="t-prop">${prop}</span>`;
      return m;
    },
  );
}

let snippetText = "";
function updateSnippet() {
  snippetText = genSnippet();
  document.getElementById("snippet").innerHTML = highlight(snippetText);
}

// Add N color pickers for a gradient effect, writing back to params.colors.
function bindGradientStops(folder, effect, n) {
  const proxy = {};
  for (let i = 0; i < n; i++) {
    proxy[`stop${i}`] = effect.params.colors[i] ?? "#ffffff";
  }
  const sync = () => {
    effect.params.colors = Array.from({ length: n }, (_, i) => proxy[`stop${i}`]);
  };
  for (let i = 0; i < n; i++) {
    folder.addBinding(proxy, `stop${i}`, { label: `color ${i + 1}` }).on("change", sync);
  }
}

// The sidebar effect list: every effect as a toggle, in apply order,
// draggable to reorder. Active items show their position number.
let dragUid = null;
function buildEffectList() {
  listEl.innerHTML = "";
  for (const it of items) {
    const btn = document.createElement("div");
    btn.className = "side-btn" + (it.active ? " active" : "");
    btn.draggable = true;
    btn.innerHTML =
      `<span class="grip">⠿</span>` +
      `<span class="label">${it.key}</span>` +
      `<span class="mark">${it.active ? "✓" : "+"}</span>`;

    btn.addEventListener("click", () => toggleEffect(it.uid));
    btn.addEventListener("dragstart", (e) => {
      dragUid = it.uid;
      e.dataTransfer.effectAllowed = "move";
      btn.classList.add("dragging");
    });
    btn.addEventListener("dragend", () => btn.classList.remove("dragging"));
    btn.addEventListener("dragover", (e) => {
      e.preventDefault();
      const r = btn.getBoundingClientRect();
      const after = e.clientY - r.top > r.height / 2;
      btn.classList.toggle("drop-after", after);
      btn.classList.toggle("drop-before", !after);
    });
    btn.addEventListener("dragleave", () =>
      btn.classList.remove("drop-before", "drop-after"),
    );
    btn.addEventListener("drop", (e) => {
      e.preventDefault();
      e.stopPropagation(); // handled here, not by the sidebar end-drop
      const r = btn.getBoundingClientRect();
      const after = e.clientY - r.top > r.height / 2;
      btn.classList.remove("drop-before", "drop-after");
      reorderEffect(dragUid, it.uid, after);
    });
    listEl.appendChild(btn);
  }
}

// Enable/disable an effect (instance kept so params persist on re-toggle).
function toggleEffect(uid) {
  const it = items.find((i) => i.uid === uid);
  if (!it) return;
  it.active = !it.active;
  if (it.active && !it.effect) it.effect = EFFECTS[it.key].make();
  mount();
}

// Move the dragged effect to just before/after the drop target.
function reorderEffect(fromUid, toUid, after) {
  if (fromUid == null || fromUid === toUid) return;
  const from = items.findIndex((i) => i.uid === fromUid);
  if (from < 0) return;
  const [moved] = items.splice(from, 1);
  let to = items.findIndex((i) => i.uid === toUid);
  if (after) to += 1;
  items.splice(to, 0, moved);
  mount();
}

// Move the dragged effect to the end (drop in the empty area below).
function moveToEnd(uid) {
  if (uid == null) return;
  const from = items.findIndex((i) => i.uid === uid);
  if (from < 0 || from === items.length - 1) return;
  const [moved] = items.splice(from, 1);
  items.push(moved);
  mount();
}

// Rebuild the VFX pipeline from the current stack, then the pane.
// Serialized: a remove + re-add must finish before the next runs, or VFX
// rejects the re-attached effect instances ("already attached").
let mountChain = Promise.resolve();
function mount() {
  mountChain = mountChain.then(doMount);
  return mountChain;
}
async function doMount() {
  if (addedEl) {
    vfx.remove(addedEl);
    addedEl = null;
  }
  const active = activeItems();
  if (active.length > 0) {
    await vfx.add(activeEl, { effect: active.map((s) => s.effect) });
    addedEl = activeEl;
  }
  buildEffectList();
  buildPane();
  updateSnippet();
}

const listEl = document.getElementById("effect-list");

// Dropping in the sidebar's empty area (below the list) moves to the end.
const sidebarEl = document.getElementById("sidebar");
sidebarEl.addEventListener("dragover", (e) => {
  e.preventDefault();
  if (e.target.closest(".side-btn")) return;
  listEl.lastElementChild?.classList.add("drop-after");
});
sidebarEl.addEventListener("dragleave", (e) => {
  if (e.target.closest(".side-btn")) return;
  listEl.lastElementChild?.classList.remove("drop-after");
});
sidebarEl.addEventListener("drop", (e) => {
  e.preventDefault();
  listEl.lastElementChild?.classList.remove("drop-after");
  moveToEnd(dragUid);
});

// Hidden input for local file uploads.
const fileInput = document.createElement("input");
fileInput.type = "file";
fileInput.accept = "image/*";
fileInput.style.display = "none";
document.body.appendChild(fileInput);
fileInput.addEventListener("change", async () => {
  const f = fileInput.files?.[0];
  if (!f) return;
  await loadImage(URL.createObjectURL(f));
  await mount();
});

const copyBtn = document.getElementById("copy-btn");
copyBtn.addEventListener("click", async () => {
  await navigator.clipboard.writeText(snippetText);
  copyBtn.textContent = "Copied";
  setTimeout(() => (copyBtn.textContent = "Copy"), 1200);
});

await loadSource(state.Source);
toggleEffect(items.find((i) => i.key === "Warp").uid);
</script>
</body>
</html>
