<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>pixelsort / vfx-js</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efece4;
    --ink: #1a1a1a;
    --dim: #6b6b66;
    --rule: #c8c4b8;
    --accent: #d83b1a;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --serif: 'Fraunces', 'Times New Roman', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body {
    padding: 24px 32px 48px;
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--ink);
    margin-bottom: 36px;
  }

  .title {
    font-family: var(--serif);
    font-weight: 300;
    font-style: italic;
    font-size: 56px;
    line-height: 0.95;
    letter-spacing: -0.02em;
  }

  .title em {
    font-style: normal;
    color: var(--accent);
  }

  .meta {
    text-align: right;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .meta div + div { margin-top: 2px; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 36px;
    align-items: start;
  }

  .stage {
    position: relative;
    background: #fff;
    border: 1px solid var(--rule);
  }

  .stage img {
    display: block;
    width: 100%;
    height: auto;
  }

  .caption {
    margin-top: 8px;
    font-size: 11px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    letter-spacing: 0.04em;
  }

  aside {
    font-size: 12px;
    border-left: 1px solid var(--rule);
    padding-left: 20px;
  }

  aside h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-style: italic;
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .control { margin-bottom: 18px; }

  .control label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
    margin-bottom: 6px;
  }

  .control label .val {
    color: var(--ink);
    font-weight: 500;
  }

  .control input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    background: transparent;
  }

  .control select,
  .control button {
    width: 100%;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
  }

  .control button:hover { background: var(--ink); color: var(--bg); }

  .pipeline {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-size: 10.5px;
    color: var(--dim);
  }

  .pipeline ol { list-style: none; counter-reset: p; }
  .pipeline li {
    counter-increment: p;
    padding: 4px 0;
    display: flex;
    gap: 10px;
  }
  .pipeline li::before {
    content: "pass." counter(p, decimal-leading-zero);
    color: var(--accent);
    font-weight: 500;
  }

  footer {
    margin-top: 48px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-size: 10px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="title">pixel<em>·</em>sort<br>study<em>—</em>01</div>
  <div class="meta">
    <div>vfx-js / effect api</div>
    <div>rank-based · 3 pass</div>
    <div>2026</div>
  </div>
</header>

<div class="layout">
  <main>
    <div class="stage">
      <img id="src" crossorigin="anonymous" alt="source">
    </div>
    <div class="caption">
      <span>fig.01 — sorted by luminance, ltr</span>
      <span id="fps">— fps</span>
    </div>
  </main>

  <aside>
    <h2>controls</h2>

    <div class="control">
      <label>threshold T <span class="val" id="v-t">0.40</span></label>
      <input type="range" id="c-t" min="0" max="1" step="0.01" value="0.4">
    </div>

    <div class="control">
      <label>pixelate W' <span class="val" id="v-w">256</span></label>
      <input type="range" id="c-w" min="32" max="512" value="256" step="2">
    </div>

    <div class="control">
      <label>swirl <span class="val" id="v-s">0.60</span></label>
      <input type="range" id="c-s" min="0" max="1" step="0.01" value="0.6">
    </div>

    <div class="control">
      <label>flow scale <span class="val" id="v-f">0.030</span></label>
      <input type="range" id="c-f" min="0.005" max="0.15" step="0.001" value="0.03">
    </div>

    <div class="control">
      <label>compare key</label>
      <select id="c-key">
        <option value="0">luminance</option>
        <option value="1">red</option>
        <option value="2">green</option>
        <option value="3">blue</option>
        <option value="4">hue</option>
        <option value="5">saturation</option>
      </select>
    </div>

    <div class="control">
      <label>direction</label>
      <select id="c-dir">
        <option value="0">→ right</option>
        <option value="1">← left</option>
      </select>
    </div>

    <div class="control">
      <button id="c-toggle">bypass effect</button>
    </div>

    <div class="pipeline">
      <ol>
        <li>downsample WxH → W'xH</li>
        <li>walk curl streamline ±N, rank within</li>
        <li>gather along streamline → canvas</li>
      </ol>
    </div>
  </aside>
</div>

<footer>
  <span>moyō / study</span>
  <span>rank-based pixelsort · 2026.05</span>
</footer>

<script type="module">
import { VFX } from "@vfx-js/core";

// ─────────────────────────────────────────────
// shaders
// ─────────────────────────────────────────────

const FRAG_DOWNSAMPLE = `#version 300 es
precision highp float;
in vec2 uvSrc;
out vec4 outColor;
uniform sampler2D src;
void main() {
    outColor = texture(src, uvSrc);
}
`;

// keyComputeFunctions: 0=lum, 1=R, 2=G, 3=B, 4=hue, 5=sat
const KEY_FUNC = `
float key(vec3 c, int mode) {
    if (mode == 0) return dot(c, vec3(0.299, 0.587, 0.114));
    if (mode == 1) return c.r;
    if (mode == 2) return c.g;
    if (mode == 3) return c.b;
    float mx = max(max(c.r, c.g), c.b);
    float mn = min(min(c.r, c.g), c.b);
    float d  = mx - mn;
    if (mode == 5) return mx > 0.0 ? d / mx : 0.0;
    // hue
    if (d < 1e-5) return 0.0;
    float h;
    if (mx == c.r)      h = (c.g - c.b) / d + (c.g < c.b ? 6.0 : 0.0);
    else if (mx == c.g) h = (c.b - c.r) / d + 2.0;
    else                h = (c.r - c.g) / d + 4.0;
    return h / 6.0;
}
`;

// Stream-function pixelsort.
//
// Build a 2D scalar field psi from value noise; the streamline tangent
// is perp(grad psi). Each pixel walks ±step along that tangent (blended
// with horizontal by `swirl`), threshold-bounded, accumulating rank.
//
// Not a strict pixelsort: nearby pixels traverse slightly different
// discretized paths so the segment set isn't perfectly shared. Visually
// it reads as "sort along curving streams" without visible breakage at
// moderate scales.

const FLOW_FUNC = `
float h21(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}
float vnoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(h21(i), h21(i + vec2(1.0, 0.0)), f.x),
               mix(h21(i + vec2(0.0, 1.0)), h21(i + vec2(1.0, 1.0)), f.x), f.y);
}
// Numerical gradient of psi; tangent = perp(grad psi) = streamline dir.
vec2 flowDir(vec2 p, float scale) {
    const float eps = 0.5;
    float dx = vnoise((p + vec2(eps, 0.0)) * scale) - vnoise((p - vec2(eps, 0.0)) * scale);
    float dy = vnoise((p + vec2(0.0, eps)) * scale) - vnoise((p - vec2(0.0, eps)) * scale);
    vec2 d = vec2(-dy, dx);
    float l = length(d);
    return l > 1e-6 ? d / l : vec2(1.0, 0.0);
}
vec2 walkDir(vec2 p, float scale, float swirl) {
    vec2 d = mix(vec2(1.0, 0.0), flowDir(p, scale), swirl);
    float l = length(d);
    return l > 1e-6 ? d / l : vec2(1.0, 0.0);
}
bool oob(vec2 p, vec2 size) {
    return p.x < 0.0 || p.x >= size.x || p.y < 0.0 || p.y >= size.y;
}
`;

const MAX_WALK_GLSL = "192";

const FRAG_RANK = `#version 300 es
precision highp float;
in vec2 uv;
out vec4 outColor;
uniform sampler2D src;
uniform vec2 srcSize;
uniform float threshold;
uniform float swirl;
uniform float flowScale;
uniform int keyMode;
uniform int direction;   // 0=ascending, 1=descending

${KEY_FUNC}
${FLOW_FUNC}

const int MAX_WALK = ${MAX_WALK_GLSL};

void main() {
    ivec2 p = ivec2(gl_FragCoord.xy);
    vec2 size = srcSize;
    vec2 p0 = vec2(p) + 0.5;

    float myKey = key(texelFetch(src, p, 0).rgb, keyMode);
    if (myKey <= threshold) {
        outColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
    }

    int myIdx = p.x + p.y * 65536;
    int rank = 0;

    // forward
    vec2 pos = p0;
    for (int i = 0; i < MAX_WALK; i++) {
        vec2 d = walkDir(pos, flowScale, swirl);
        vec2 next = pos + d;
        if (oob(next, size)) break;
        ivec2 ip = ivec2(floor(next));
        float k = key(texelFetch(src, ip, 0).rgb, keyMode);
        if (k <= threshold) break;
        pos = next;
        int idx = ip.x + ip.y * 65536;
        if (direction == 0) {
            if (k < myKey || (k == myKey && idx < myIdx)) rank++;
        } else {
            if (k > myKey || (k == myKey && idx < myIdx)) rank++;
        }
    }

    // backward
    pos = p0;
    for (int i = 0; i < MAX_WALK; i++) {
        vec2 d = walkDir(pos, flowScale, swirl);
        vec2 next = pos - d;
        if (oob(next, size)) break;
        ivec2 ip = ivec2(floor(next));
        float k = key(texelFetch(src, ip, 0).rgb, keyMode);
        if (k <= threshold) break;
        pos = next;
        int idx = ip.x + ip.y * 65536;
        if (direction == 0) {
            if (k < myKey || (k == myKey && idx < myIdx)) rank++;
        } else {
            if (k > myKey || (k == myKey && idx < myIdx)) rank++;
        }
    }

    outColor = vec4(float(rank), 0.0, 0.0, 1.0);
}
`;

const FRAG_GATHER = `#version 300 es
precision highp float;
in vec2 uvSrc;
out vec4 outColor;
uniform sampler2D src;       // RT_A (W'xH)
uniform sampler2D rankTex;   // RT_rank (W'xH)
uniform vec2 lowSize;        // (W', H)
uniform float threshold;
uniform float swirl;
uniform float flowScale;
uniform int keyMode;

${KEY_FUNC}
${FLOW_FUNC}

const int MAX_WALK = ${MAX_WALK_GLSL};

void main() {
    ivec2 myIp = ivec2(uvSrc * lowSize);
    vec2 size = lowSize;
    vec2 p0 = vec2(myIp) + 0.5;

    float myKey = key(texelFetch(src, myIp, 0).rgb, keyMode);
    if (myKey <= threshold) {
        outColor = texelFetch(src, myIp, 0);
        return;
    }

    // target rank = backward distance to segment start
    int targetRank = 0;
    vec2 pos = p0;
    for (int i = 0; i < MAX_WALK; i++) {
        vec2 d = walkDir(pos, flowScale, swirl);
        vec2 next = pos - d;
        if (oob(next, size)) break;
        ivec2 ip = ivec2(floor(next));
        float k = key(texelFetch(src, ip, 0).rgb, keyMode);
        if (k <= threshold) break;
        pos = next;
        targetRank++;
    }

    int myRank = int(texelFetch(rankTex, myIp, 0).r + 0.5);
    if (myRank == targetRank) {
        outColor = texelFetch(src, myIp, 0);
        return;
    }

    // scan segment looking for the pixel whose stored rank == targetRank
    pos = p0;
    for (int i = 0; i < MAX_WALK; i++) {
        vec2 d = walkDir(pos, flowScale, swirl);
        vec2 next = pos - d;
        if (oob(next, size)) break;
        ivec2 ip = ivec2(floor(next));
        float k = key(texelFetch(src, ip, 0).rgb, keyMode);
        if (k <= threshold) break;
        pos = next;
        int r = int(texelFetch(rankTex, ip, 0).r + 0.5);
        if (r == targetRank) {
            outColor = texelFetch(src, ip, 0);
            return;
        }
    }
    pos = p0;
    for (int i = 0; i < MAX_WALK; i++) {
        vec2 d = walkDir(pos, flowScale, swirl);
        vec2 next = pos + d;
        if (oob(next, size)) break;
        ivec2 ip = ivec2(floor(next));
        float k = key(texelFetch(src, ip, 0).rgb, keyMode);
        if (k <= threshold) break;
        pos = next;
        int r = int(texelFetch(rankTex, ip, 0).r + 0.5);
        if (r == targetRank) {
            outColor = texelFetch(src, ip, 0);
            return;
        }
    }

    outColor = texelFetch(src, myIp, 0);
}
`;

// ─────────────────────────────────────────────
// Effect class
// ─────────────────────────────────────────────

class PixelSortEffect {
    constructor(params) {
        this.params = params;
        this._lowRT = null;
        this._rankRT = null;
        this._lowW = 0;
        this._h = 0;
    }

    _ensureSize(ctx) {
        // init で elementPixel は placeholder [1,1]。
        // 実寸は render 時点まで分からないので、lowW/h どちらか変わったら作り直す。
        const [, h] = ctx.dims.elementPixel;
        const lowW = this.params.lowW;
        if (this._lowW === lowW && this._h === h) return;
        this._lowRT?.dispose?.();
        this._rankRT?.dispose?.();
        this._lowW = lowW;
        this._h = h;
        this._lowRT = ctx.createRenderTarget({
            size: [lowW, h],
            filter: "nearest",
        });
        this._rankRT = ctx.createRenderTarget({
            size: [lowW, h],
            filter: "nearest",
            float: true,
        });
    }

    render(ctx) {
        this._ensureSize(ctx);

        if (this.params.bypass) {
            // 単純パススルー
            ctx.draw({
                frag: `#version 300 es
                    precision highp float;
                    in vec2 uvSrc;
                    out vec4 outColor;
                    uniform sampler2D src;
                    void main() { outColor = texture(src, uvSrc); }`,
                uniforms: { src: ctx.src },
                target: ctx.target,
            });
            return;
        }

        const [, h] = ctx.dims.elementPixel;
        const lowSize = [this._lowW, h];

        // pass0
        ctx.draw({
            frag: FRAG_DOWNSAMPLE,
            uniforms: { src: ctx.src },
            target: this._lowRT,
        });

        // pass1
        ctx.draw({
            frag: FRAG_RANK,
            uniforms: {
                src: this._lowRT,
                srcSize: lowSize,
                threshold: this.params.threshold,
                swirl: this.params.swirl,
                flowScale: this.params.flowScale,
                keyMode: this.params.keyMode,
                direction: this.params.direction,
            },
            target: this._rankRT,
        });

        // pass2
        ctx.draw({
            frag: FRAG_GATHER,
            uniforms: {
                src: this._lowRT,
                rankTex: this._rankRT,
                lowSize: lowSize,
                threshold: this.params.threshold,
                swirl: this.params.swirl,
                flowScale: this.params.flowScale,
                keyMode: this.params.keyMode,
            },
            target: ctx.target,
        });
    }
}

// ─────────────────────────────────────────────
// setup
// ─────────────────────────────────────────────

const img = document.getElementById("src");

img.src = "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&h=600&fit=crop";

await new Promise(res => {
    if (img.complete && img.naturalWidth > 0) res();
    else img.addEventListener("load", res, { once: true });
});

const params = {
    threshold: 0.4,
    lowW: 256,
    swirl: 0.6,
    flowScale: 0.03,
    keyMode: 0,
    direction: 0,
    bypass: false,
};

const effect = new PixelSortEffect(params);

const vfx = new VFX();
vfx.add(img, { effect });

// ─────────────────────────────────────────────
// controls
// ─────────────────────────────────────────────

const bind = (id, valId, key, parse = Number, fmt = String) => {
    const el = document.getElementById(id);
    const v = document.getElementById(valId);
    const update = () => {
        params[key] = parse(el.value);
        if (v) v.textContent = fmt(el.value);
    };
    el.addEventListener("input", update);
    update();
};

bind("c-t", "v-t", "threshold", Number, v => Number(v).toFixed(2));
bind("c-w", "v-w", "lowW");
bind("c-s", "v-s", "swirl", Number, v => Number(v).toFixed(2));
bind("c-f", "v-f", "flowScale", Number, v => Number(v).toFixed(3));

document.getElementById("c-key").addEventListener("change", e => {
    params.keyMode = Number(e.target.value);
});
document.getElementById("c-dir").addEventListener("change", e => {
    params.direction = Number(e.target.value);
});

const toggleBtn = document.getElementById("c-toggle");
toggleBtn.addEventListener("click", () => {
    params.bypass = !params.bypass;
    toggleBtn.textContent = params.bypass ? "enable effect" : "bypass effect";
});

// ─────────────────────────────────────────────
// fps meter
// ─────────────────────────────────────────────

const fpsEl = document.getElementById("fps");
let frames = 0, last = performance.now();
function tick() {
    frames++;
    const now = performance.now();
    if (now - last >= 500) {
        const fps = Math.round((frames * 1000) / (now - last));
        fpsEl.textContent = `${fps} fps`;
        frames = 0; last = now;
    }
    requestAnimationFrame(tick);
}
tick();
</script>

</body>
</html>
