<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Light Streak · Anamorphic & Aperture Flare</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@200;600;800&display=swap"
/>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #050608;
    color: #eef2ff;
    font-family: "Sora", system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  .stage {
    position: relative;
    width: min(92vw, 1100px);
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* The source image: photos cover the frame, the logo is letterboxed
     (object-fit set per-source in JS). */
  #photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    user-select: none;
    -webkit-user-drag: none;
  }

  .hint {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(207, 224, 255, 0.6);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="stage">
  <img id="photo" crossorigin="anonymous" alt="streak source" data-streak />
</div>

<div class="hint">Pick a source and switch anamorphic ↔ aperture starburst in the panel</div>

<script type="module">
  import { VFX } from "@vfx-js/core";
  import {
    AnamorphicStreakEffect,
    LightStreakEffect,
    LightStreakGlareEffect,
  } from "@vfx-js/effects";
  import { Pane } from "https://esm.sh/tweakpane@4.0.5";

  const photo = document.getElementById("photo");

  const vfx = new VFX({ pixelRatio: Math.min(window.devicePixelRatio || 1, 2) });

  // Selectable sources. The white logo (letterboxed) and night scenes with
  // bright specular highlights (headlights, lamps) all give the streaks
  // plenty to grab onto. `new URL(..., import.meta.url)` so Vite bundles
  // the local SVG.
  const UNSPLASH = "https://images.unsplash.com/";
  const IMG_SUFFIX = "?w=1280&h=720&fit=crop&crop=entropy";
  const LOGO_URL = new URL("./light-streak-logo.svg", import.meta.url).href;
  const IMAGES = [
    { id: "logo", label: "VFX-JS logo", src: LOGO_URL, fit: "contain" },
    { id: "city", label: "City lights", src: `${UNSPLASH}photo-1514565131-fce0801e5785${IMG_SUFFIX}`, fit: "cover" },
    { id: "mercedes", label: "Mercedes", src: `${UNSPLASH}photo-1624085568108-36410cfe4d24${IMG_SUFFIX}`, fit: "cover" },
    { id: "motorcycle", label: "Motorcycle", src: `${UNSPLASH}photo-1567516365182-1498ada52f85${IMG_SUFFIX}`, fit: "cover" },
    { id: "blackcar", label: "Black car", src: `${UNSPLASH}photo-1564890379653-0eb3a6b4eaad${IMG_SUFFIX}`, fit: "cover" },
  ];
  const imageParams = { image: IMAGES[0].id };

  // Load the initial source before attaching the effect.
  const initialImage = IMAGES[0];
  photo.src = initialImage.src;
  photo.style.objectFit = initialImage.fit;
  try {
    await photo.decode();
  } catch {}

  // Shared, mutable params so a single pane drives every target. Effect
  // instances aren't reusable across elements, so mint one per target but
  // point them all at this same object via setParams.
  const params = {
    // "instance"   = stretched-sprite splat (LightStreakEffect)
    // "glare"      = Blender-style fullscreen streaks (LightStreakGlareEffect)
    // "anamorphic" = KinoStreak horizontal pyramid (AnamorphicStreakEffect)
    strategy: "glare",
    preset: "anamorphic",
    blades: 6,
    angle: 0,
    threshold: 0.78,
    maxBrightness: 1.0,
    intensity: 1.1,
    dispersion: 0.6,
    resolution: 0.5,
    tintR: 0.6,
    tintG: 0.8,
    tintB: 1.0,
    // instance-only
    length: 220,
    thickness: 2,
    falloff: 1.5,
    gamma: 2.2,
    density: 256,
    // glare-only
    iterations: 3,
    fade: 0.9,
    colorModulation: 0.25,
    streakSoftness: 1.5,
    smoothness: 0.1,
    // anamorphic-only
    stretch: 0.78,
  };

  // A physical aperture's spike count is blades (even) or 2×blades (odd);
  // anamorphic is just a single horizontal axis = 2 opposing rays.
  function streakCount() {
    if (params.preset === "anamorphic") return 2;
    return params.blades % 2 === 0 ? params.blades : params.blades * 2;
  }

  function liveParams() {
    const shared = {
      threshold: params.threshold,
      maxBrightness: params.maxBrightness,
      intensity: params.intensity,
      tint: [params.tintR, params.tintG, params.tintB],
    };
    if (params.strategy === "instance") {
      return {
        ...shared,
        streaks: streakCount(),
        angle: params.angle,
        length: params.length,
        thickness: params.thickness,
        falloff: params.falloff,
        gamma: params.gamma,
        dispersion: params.dispersion,
        density: params.density,
        pad: Math.ceil(params.length * 1.2),
      };
    }
    if (params.strategy === "anamorphic") {
      return {
        ...shared,
        stretch: params.stretch,
        dispersion: params.dispersion,
        resolution: params.resolution,
        intensity: params.intensity * 2, // pyramid streak values run low
        pad: 240,
      };
    }
    return {
      ...shared,
      streaks: streakCount(),
      angle: params.angle,
      iterations: params.iterations,
      fade: params.fade,
      colorModulation: params.colorModulation,
      streakSoftness: params.streakSoftness,
      smoothness: params.smoothness,
      resolution: params.resolution,
      pad: 240,
    };
  }

  function makeEffect() {
    const Ctor =
      params.strategy === "instance"
        ? LightStreakEffect
        : params.strategy === "anamorphic"
          ? AnamorphicStreakEffect
          : LightStreakGlareEffect;
    return new Ctor(liveParams());
  }

  const targets = [...document.querySelectorAll("[data-streak]")];
  let effects = [];

  async function attachAll() {
    effects = [];
    for (const el of targets) {
      const effect = makeEffect();
      effects.push(effect);
      if (el instanceof HTMLImageElement) {
        await vfx.add(el, { effect });
      } else {
        await vfx.addHTML(el, { effect, zIndex: 1 });
      }
    }
  }
  await attachAll();

  function sync() {
    const p = liveParams();
    for (const e of effects) e.setParams(p);
  }

  // Effect instances can't change type in place; rebuild on strategy swap.
  async function rebuild() {
    for (const el of targets) vfx.remove(el);
    await attachAll();
  }

  // Swap the backdrop and re-capture it (images aren't auto-refreshed).
  let switching = false;
  async function switchImage(id) {
    const spec = IMAGES.find((i) => i.id === id);
    if (!spec || switching) return;
    switching = true;
    photo.src = spec.src;
    photo.style.objectFit = spec.fit;
    try {
      await photo.decode();
    } catch {}
    await vfx.update(photo);
    switching = false;
  }

  // --- Tweakpane ----------------------------------------------------------
  const paneContainer = document.createElement("div");
  paneContainer.style.cssText =
    "position:fixed;top:16px;right:16px;width:280px;z-index:10000";
  document.body.appendChild(paneContainer);
  const pane = new Pane({ container: paneContainer, title: "Light Streak" });

  pane
    .addBinding(imageParams, "image", {
      options: Object.fromEntries(IMAGES.map((i) => [i.label, i.id])),
    })
    .on("change", (e) => switchImage(e.value));
  pane
    .addBinding(params, "strategy", {
      options: {
        "glare (Blender)": "glare",
        "anamorphic (Kino)": "anamorphic",
        "instance (sprite)": "instance",
      },
    })
    .on("change", rebuild);
  pane
    .addBinding(params, "preset", {
      options: { anamorphic: "anamorphic", "aperture star": "aperture" },
    })
    .on("change", sync);
  pane.addBinding(params, "blades", { min: 3, max: 12, step: 1 }).on("change", sync);
  pane.addBinding(params, "angle", { min: 0, max: 6.283, step: 0.01 }).on("change", sync);
  pane.addBinding(params, "threshold", { min: 0, max: 1, step: 0.01 }).on("change", sync);
  pane.addBinding(params, "maxBrightness", { min: 0.1, max: 1, step: 0.01 }).on("change", sync);
  pane.addBinding(params, "intensity", { min: 0, max: 3, step: 0.01 }).on("change", sync);
  // shared by instance + anamorphic (dispersion) and glare + anamorphic (resolution)
  pane.addBinding(params, "dispersion", { min: 0, max: 1, step: 0.01 }).on("change", sync);
  pane.addBinding(params, "resolution", { min: 0.25, max: 1, step: 0.05 }).on("change", sync);

  // instance-only
  const inst = pane.addFolder({ title: "Instance" });
  inst.addBinding(params, "length", { min: 0, max: 480, step: 1 }).on("change", sync);
  inst.addBinding(params, "thickness", { min: 0.5, max: 8, step: 0.1 }).on("change", sync);
  inst.addBinding(params, "falloff", { min: 0.5, max: 4, step: 0.05 }).on("change", sync);
  inst.addBinding(params, "gamma", { min: 0.5, max: 5, step: 0.05 }).on("change", sync);
  inst.addBinding(params, "density", { min: 64, max: 512, step: 32 }).on("change", sync);

  // glare-only
  const glare = pane.addFolder({ title: "Glare" });
  glare.addBinding(params, "iterations", { min: 1, max: 5, step: 1 }).on("change", sync);
  glare.addBinding(params, "fade", { min: 0.5, max: 0.99, step: 0.01 }).on("change", sync);
  glare.addBinding(params, "colorModulation", { min: 0, max: 1, step: 0.01 }).on("change", sync);
  glare.addBinding(params, "streakSoftness", { min: 0, max: 5, step: 0.1 }).on("change", sync);
  glare.addBinding(params, "smoothness", { min: 0, max: 0.5, step: 0.01 }).on("change", sync);

  // anamorphic-only
  const anam = pane.addFolder({ title: "Anamorphic" });
  anam.addBinding(params, "stretch", { min: 0, max: 0.95, step: 0.01 }).on("change", sync);

  const tint = pane.addFolder({ title: "Tint" });
  tint.addBinding(params, "tintR", { min: 0, max: 1, step: 0.01 }).on("change", sync);
  tint.addBinding(params, "tintG", { min: 0, max: 1, step: 0.01 }).on("change", sync);
  tint.addBinding(params, "tintB", { min: 0, max: 1, step: 0.01 }).on("change", sync);
</script>

</body>
</html>
