name: Deploy PR Preview to Cloudflare Pages

on:
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: cf-preview-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    deploy-preview:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy packages/docs/dist --project-name=vfx-js --branch=${{ github.head_ref }}

            - name: Comment preview URL on PR
              uses: marocchino/sticky-pull-request-comment@v3
              with:
                  header: cf-preview
                  message: |
                      🚀 **Cloudflare Pages preview** — ${{ github.event.pull_request.head.sha }}

                      | Page | URL |
                      | --- | --- |
                      | Top | ${{ steps.deploy.outputs.deployment-url }} |
                      | Examples | ${{ steps.deploy.outputs.deployment-url }}/examples/ |
                      | Storybook | ${{ steps.deploy.outputs.deployment-url }}/storybook/ |
                      | Docs | ${{ steps.deploy.outputs.deployment-url }}/docs/ |
